name: Databricks CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Configure Databricks
        run: |
          mkdir -p ~/.databricks
          echo "[DEFAULT]
          host = ${{ secrets.DATABRICKS_HOST }}
          token = ${{ secrets.DATABRICKS_TOKEN }}" > ~/.databrickscfg

      - name: Debug Repo Structure
        run: |
          echo "Listing repo files:"
          ls -R

      - name: Deploy Notebooks
        run: |
          databricks workspace import-dir Notebooks /Workspace/Sales_Data_Project --overwrite

      - name: Deploy Job
        run: |
          databricks jobs create --json-file job/jobs.json
